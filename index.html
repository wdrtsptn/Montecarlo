<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Monte Carlo Simulator v2</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>Football Monte Carlo Simulator</h1>

<p>
Monte Carlo • Poisson Distribution • Football Prediction Engine
</p>

</header>



<!-- SETTINGS -->

<section class="settings">

<div class="settings-grid">

<div class="setting">

<label>

Simulation Count

</label>

<input
id="simulationCount"
type="number"
value="10000"
min="1000"
step="1000">

</div>

<div class="setting">

<label>

Home Advantage

</label>

<input
id="homeAdvantage"
type="number"
value="1.08"
step="0.01">

</div>

<div class="setting">

<label>

Maximum Goals

</label>

<input
id="maxGoals"
type="number"
value="10">

</div>

</div>

</section>



<!-- MATCH LIST -->

<section id="matches">

<!-- MATCH 1 -->

<div class="match-card">

<div class="title">

<h2>

Match 1

</h2>

</div>

<div class="grid">

<div>

<label>

Home Team

</label>

<input
type="text"
class="homeTeam"
placeholder="Manchester City">

</div>

<div>

<label>

Away Team

</label>

<input
type="text"
class="awayTeam"
placeholder="Liverpool">

</div>

<div>

<label>

Home xG

</label>

<input
type="number"
class="homeXG"
step="0.01"
value="1.75">

</div>

<div>

<label>

Away xG

</label>

<input
type="number"
class="awayXG"
step="0.01"
value="1.12">

</div>

<div>

<label>

Attack Rating Home

</label>

<input
type="number"
class="homeAttack"
step="0.01"
value="1">

</div>

<div>

<label>

Attack Rating Away

</label>

<input
type="number"
class="awayAttack"
step="0.01"
value="1">

</div>

<div>

<label>

Defense Rating Home

</label>

<input
type="number"
class="homeDefense"
step="0.01"
value="1">

</div>

<div>

<label>

Defense Rating Away

</label>

<input
type="number"
class="awayDefense"
step="0.01"
value="1">

</div>

</div>

</div>



<!-- MATCH 2 -->

<div class="match-card">

<div class="title">

<h2>

Match 2

</h2>

</div>

<div class="grid">

<div>

<label>Home Team</label>

<input type="text" class="homeTeam">

</div>

<div>

<label>Away Team</label>

<input type="text" class="awayTeam">

</div>

<div>

<label>Home xG</label>

<input type="number" class="homeXG" step="0.01">

</div>

<div>

<label>Away xG</label>

<input type="number" class="awayXG" step="0.01">

</div>

<div>

<label>Attack Rating Home</label>

<input type="number" class="homeAttack" step="0.01" value="1">

</div>

<div>

<label>Attack Rating Away</label>

<input type="number" class="awayAttack" step="0.01" value="1">

</div>

<div>

<label>Defense Rating Home</label>

<input type="number" class="homeDefense" step="0.01" value="1">

</div>

<div>

<label>Defense Rating Away</label>

<input type="number" class="awayDefense" step="0.01" value="1">

</div>

</div>

</div>

<!-- MATCH 3, MATCH 4, dan MATCH 5 strukturnya IDENTIK dengan Match 2.
Copy blok Match 2 lalu ubah judulnya menjadi Match 3, Match 4, dan Match 5. -->

</section>



<section class="controls">

<button id="simulateButton">

RUN SIMULATION

</button>

</section>



<section>

<div id="loadingBar">

<div id="loadingProgress"></div>

</div>

</section>



<section id="results">

</section>

</div>

<script src="js/utils.js"></script>
<script src="js/poisson.js"></script>
<script src="js/montecarlo.js"></script>
<script src="js/simulator.js"></script>
<script src="js/odds.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/main.js"></script>

</body>

</html>
